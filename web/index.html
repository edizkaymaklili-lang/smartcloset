<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Smart Closet — Your personal style companion">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Smart Closet">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Smart Closet</title>
  <link rel="manifest" href="manifest.json">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Cropper.js — required by image_cropper for web -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #F8BBD0 0%, #ffffff 50%, #D1C4E9 100%);
      font-family: 'Poppins', sans-serif;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #F8BBD0 0%, #ffffff 50%, #D1C4E9 100%);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo-box {
      width: 110px;
      height: 110px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(233, 30, 99, 0.35);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .app-name {
      margin-top: 24px;
      font-size: 28px;
      font-weight: 700;
      color: #212121;
      letter-spacing: 0.5px;
    }

    .tagline {
      margin-top: 8px;
      font-size: 14px;
      color: #757575;
      font-weight: 400;
    }

    .spinner {
      margin-top: 40px;
      width: 36px;
      height: 36px;
      border: 3px solid rgba(233, 30, 99, 0.2);
      border-top-color: #E91E63;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);   box-shadow: 0 12px 32px rgba(233, 30, 99, 0.35); }
      50%       { transform: scale(1.06); box-shadow: 0 16px 40px rgba(233, 30, 99, 0.5); }
    }
  </style>
</head>
<body>

  <!-- Loading splash — visible until Flutter renders -->
  <div id="loading-screen">
    <div class="logo-box">
      <img src="icons/Icon-192.png" alt="Smart Closet">
    </div>
    <div class="app-name">Smart Closet</div>
    <div class="tagline">Your personal style companion</div>
    <div class="spinner"></div>
  </div>

  <!-- Unregister old service workers -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      if ('caches' in window) {
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
        });
      }
    }
  </script>

  <!-- Hide loading screen once Flutter is ready -->
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading-screen');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function() { el.remove(); }, 450);
      }
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
